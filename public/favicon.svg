<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Royal Blue to Indigo Gradient -->
    <linearGradient id="brand-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <!-- Ice Blue / Aqua Accent -->
    <linearGradient id="accent-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  
  <!-- Outer glowing background -->
  <rect width="512" height="512" rx="140" fill="#070a13" />
  
  <!-- Decorative grid lines representing development -->
  <path d="M 128 0 L 128 512 M 256 0 L 256 512 M 384 0 L 384 512 M 0 128 L 512 128 M 0 256 L 512 256 M 0 384 L 512 384" stroke="rgba(255, 255, 255, 0.03)" stroke-width="4" />
  
  <!-- Left Code Bracket styled as 'D' -->
  <path d="M 220 140 L 160 140 A 116 116 0 0 0 160 372 L 220 372" fill="none" stroke="url(#brand-grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right Sprout styled as 'G' and bracket -->
  <path d="M 292 256 L 352 256 L 352 320 A 52 52 0 0 1 248 320" fill="none" stroke="url(#accent-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- The sprouting leaf of growth/nurturing emerging from the code structure -->
  <path d="M 256 256 C 256 180, 310 130, 360 90 C 330 160, 290 220, 256 256 Z" fill="url(#accent-grad)" />
  <circle cx="360" cy="90" r="16" fill="#ffffff" />
</svg>